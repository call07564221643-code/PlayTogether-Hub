  <path d="M915 336 C930 280, 1012 282, 1027 336 C997 310, 944 310, 915 336" fill="#7c2d12"/>
  <circle cx="950" cy="355" r="6" fill="#0f172a"/><circle cx="993" cy="355" r="6" fill="#0f172a"/>
  <path d="M950 388 Q970 403 995 388" stroke="#0f172a" stroke-width="8" fill="none" stroke-linecap="round"/>
